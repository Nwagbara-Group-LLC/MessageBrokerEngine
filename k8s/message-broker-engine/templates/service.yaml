apiVersion: v1
kind: Service
metadata:
  name: {{ include "message-broker-engine.fullname" . }}
  labels:
    {{- include "message-broker-engine.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace | quote }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.service.metricsPort }}
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
    {{- if .Values.service.tcpPort }}
    - port: {{ .Values.service.tcpPort }}
      targetPort: {{ .Values.service.tcpPort }}
      protocol: TCP
      name: tcp-broker
    {{- end }}
  selector:
    {{- include "message-broker-engine.selectorLabels" . | nindent 4 }}
