apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "message-broker-engine.fullname" . }}
  labels:
    {{- include "message-broker-engine.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "message-broker-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "message-broker-engine.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "message-broker-engine.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort | default .Values.config.broker.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort | default 9090 }}
              protocol: TCP
          {{- if .Values.envFromConfigMap }}
          envFrom:
            - configMapRef:
                name: {{ include "message-broker-engine.fullname" . }}-config
          {{- end }}
          env:
            # Elasticsearch/Logging Configuration
            - name: USE_ELASTICSEARCH_LOGGING
              value: "true"
            - name: ELASTICSEARCH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | default (printf "%s-secrets" (include "message-broker-engine.fullname" .)) }}
                  key: elasticsearch-endpoint
            - name: ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | default (printf "%s-secrets" (include "message-broker-engine.fullname" .)) }}
                  key: elasticsearch-username
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | default (printf "%s-secrets" (include "message-broker-engine.fullname" .)) }}
                  key: elasticsearch-password
            {{- if .Values.config.security.enable_tls }}
            - name: TLS_CERT_PATH
              value: {{ .Values.config.security.cert_path }}
            - name: TLS_KEY_PATH
              value: {{ .Values.config.security.key_path }}
            {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            exec:
              command:
                {{- toYaml .Values.probes.liveness.command | nindent 16 }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            successThreshold: {{ .Values.probes.liveness.successThreshold }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            exec:
              command:
                {{- toYaml .Values.probes.readiness.command | nindent 16 }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /app/config/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data-volume
              mountPath: /app/data
            {{- end }}
            {{- if .Values.config.logging.enable_file_logging }}
            - name: logs-volume
              mountPath: {{ .Values.config.logging.log_directory }}
            {{- end }}
            {{- if .Values.config.security.enable_tls }}
            - name: tls-certs
              mountPath: /certs
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "message-broker-engine.fullname" . }}-config
            items:
              - key: config.yaml
                path: config.yaml
        {{- if .Values.persistence.enabled }}
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "message-broker-engine.fullname" . }}-data
        {{- end }}
        {{- if .Values.config.logging.enable_file_logging }}
        - name: logs-volume
          {{- if .Values.persistence.logs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "message-broker-engine.fullname" . }}-logs
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.config.security.enable_tls }}
        - name: tls-certs
          secret:
            secretName: {{ include "message-broker-engine.fullname" . }}-tls
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
