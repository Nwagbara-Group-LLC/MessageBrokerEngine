# Production environment overrides
replicaCount: 5

resources:
  requests:
    cpu: 1000m
    memory: 1Gi
  limits:
    cpu: 4000m
    memory: 4Gi

config:
  broker:
    max_connections: 50000
    buffer_size: 131072
    
  performance:
    thread_pool_size: 16
    message_queue_size: 500000
    cache_size: 5000
    
  logging:
    level: "INFO"
    enable_file_logging: true
    
  redis:
    enabled: true
    
  security:
    enable_tls: true

persistence:
  enabled: true
  size: 50Gi
  storageClass: "premium-ssd"
  logs:
    enabled: true
    size: 20Gi
    storageClass: "premium-ssd"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

serviceMonitor:
  enabled: true
  
networkPolicy:
  enabled: true

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - message-broker-engine
        topologyKey: kubernetes.io/hostname

priorityClassName: "high-priority"
