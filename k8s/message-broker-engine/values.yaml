# Message Broker Engine Helm Chart Values
# Production-ready configuration for high-performance message broker

# Override the full name of resources (prevents "release-name-chart-name" duplication)
fullnameOverride: "message-broker-engine"

# Image configuration
image:
  repository: prodtradingbotregistry.azurecr.io/message-broker-engine
  pullPolicy: IfNotPresent
  tag: "1.0.0"

# Image pull secrets for private registry
imagePullSecrets: []

# Service account configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

# Deployment configuration
# Redis Cloud state sync enables multi-replica support
# Set REDIS_URL env var to connect to Redis Cloud instance
replicaCount: 2
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

# Resource limits and requests
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  metricsPort: 9090
  tcpPort: 8081  # TCP wire protocol port for distributed backtest communication
  annotations: {}
  labels: {}

# Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: message-broker.trading.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ConfigMap configuration
config:
  # Message broker settings
  broker:
    port: 8080
    max_connections: 10000
    buffer_size: 65536
    timeout_seconds: 30
    
  # Performance settings
  performance:
    thread_pool_size: 8
    message_queue_size: 100000
    cache_size: 1000
    enable_metrics: true
    
  # Logging configuration
  logging:
    level: "INFO"
    format: "json"
    enable_file_logging: false
    log_directory: "/var/log/message-broker"
    
  # Security settings
  security:
    enable_tls: false
    cert_path: "/certs/tls.crt"
    key_path: "/certs/tls.key"

# Environment variables from ConfigMap
envFromConfigMap: true

# Secrets configuration
secrets:
  # Use existing secret instead of creating one (for external secret management)
  existingSecret: ""
  
  # Elasticsearch credentials for Kibana logging
  elasticsearch:
    # Set to true to enable Elasticsearch logging
    enabled: true
    # Elastic Cloud endpoint URL
    endpoint: ""
    # Elastic Cloud username
    username: ""
    # Elastic Cloud password
    password: ""
  
  # TLS certificates (if TLS enabled)
  tls_cert: ""
  tls_key: ""

# Persistence configuration
persistence:
  enabled: true
  storageClass: "hostpath"
  accessMode: ReadWriteOnce
  size: 10Gi
  
  # Logs persistence
  logs:
    enabled: true
    storageClass: "hostpath"
    size: 5Gi

# Health check configuration (exec probes - no HTTP UI)
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3
    command:
      - /bin/sh
      - -c
      - pgrep -x server || exit 1
    
  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3
    command:
      - /bin/sh
      - -c
      - pgrep -x server || exit 1

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Pod affinity and anti-affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - message-broker-engine
          topologyKey: kubernetes.io/hostname

# Horizontal Pod Autoscaler
# Redis Cloud state sync enables subscription sharing across replicas
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Service Monitor for Prometheus
serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s
  scrapeTimeout: 10s

# Network policies
networkPolicy:
  enabled: false
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: trading-platform
      ports:
        - protocol: TCP
          port: 8080

# Extra volumes and volume mounts
extraVolumes: []
extraVolumeMounts: []

# Priority class
priorityClassName: ""

# Termination grace period
terminationGracePeriodSeconds: 30

# Redis Cloud for subscription state sync (multi-replica support)
redis:
  enabled: true
  # Override with actual Redis Cloud URL in environment-specific values
  # Format: redis://user:password@host:port
  existingSecret: "message-broker-redis-secret"
  # Subscription TTL in seconds (entries auto-expire for cleanup)
  subscriptionTtl: 3600
  # Heartbeat interval for instance liveness detection
  heartbeatIntervalSecs: 10

# =============================================================================
# Per-Tenant Resource Isolation
# =============================================================================
# Deploy per-tenant with: helm install tenant-<id> . --namespace tenant-<id>
#   --set tenantResources.enabled=true --set tenantResources.tenantId=<uuid>
#   --set tenantResources.tier=<free|starter|professional|enterprise>

tenantResources:
  enabled: false
  tenantId: ""
  tier: "free"

  profiles:
    free:
      maxCpu: "500m"
      maxMemory: "1Gi"
      maxCpuLimit: "1"
      maxMemoryLimit: "2Gi"
      maxPods: "2"
      maxServices: "2"
      defaultContainerCpuRequest: "100m"
      defaultContainerCpuLimit: "500m"
      defaultContainerMemoryRequest: "128Mi"
      defaultContainerMemoryLimit: "512Mi"
      maxContainerCpu: "500m"
      maxContainerMemory: "1Gi"
      maxPodCpu: "500m"
      maxPodMemory: "1Gi"

    starter:
      maxCpu: "1"
      maxMemory: "4Gi"
      maxCpuLimit: "2"
      maxMemoryLimit: "8Gi"
      maxPods: "4"
      maxServices: "3"
      defaultContainerCpuRequest: "250m"
      defaultContainerCpuLimit: "1000m"
      defaultContainerMemoryRequest: "256Mi"
      defaultContainerMemoryLimit: "1Gi"
      maxContainerCpu: "1000m"
      maxContainerMemory: "2Gi"
      maxPodCpu: "1000m"
      maxPodMemory: "2Gi"

    professional:
      maxCpu: "4"
      maxMemory: "16Gi"
      maxCpuLimit: "8"
      maxMemoryLimit: "32Gi"
      maxPods: "8"
      maxServices: "5"
      defaultContainerCpuRequest: "500m"
      defaultContainerCpuLimit: "2000m"
      defaultContainerMemoryRequest: "512Mi"
      defaultContainerMemoryLimit: "2Gi"
      maxContainerCpu: "2000m"
      maxContainerMemory: "4Gi"
      maxPodCpu: "2000m"
      maxPodMemory: "4Gi"

    enterprise:
      maxCpu: "16"
      maxMemory: "64Gi"
      maxCpuLimit: "32"
      maxMemoryLimit: "128Gi"
      maxPods: "20"
      maxServices: "10"
      defaultContainerCpuRequest: "1000m"
      defaultContainerCpuLimit: "4000m"
      defaultContainerMemoryRequest: "1Gi"
      defaultContainerMemoryLimit: "4Gi"
      maxContainerCpu: "4000m"
      maxContainerMemory: "16Gi"
      maxPodCpu: "4000m"
      maxPodMemory: "16Gi"
