apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  labels:
    app: {{ .Values.appName }}
spec:
  replicas: {{ .Values.replicaCount }} # Adjust based on your scaling needs
  selector:
    matchLabels:
      app: {{ .Values.appName }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
    spec:
      imagePullSecrets:
        - name: acr-secret # Secret for pulling private images
      containers:
        - name: {{ .Values.appName }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }} # Replace with your image
          ports:
            - containerPort: 3000 # Replace with your app's port
        resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command:
                - "/usr/local/bin/liveness_check.sh"
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - "/usr/local/bin/health_check.sh"
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          imagePullPolicy: IfNotPresent
        terminationGracePeriodSeconds: 30