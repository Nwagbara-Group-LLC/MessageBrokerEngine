{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ultra-message-broker.serviceAccountName" . }}
  labels:
    {{- include "ultra-message-broker.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ultra-message-broker.fullname" . }}
  labels:
    {{- include "ultra-message-broker.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ultra-message-broker.fullname" . }}
  labels:
    {{- include "ultra-message-broker.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ultra-message-broker.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ultra-message-broker.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
