# Ultra-High Performance Message Broker Engine
# Production-grade Helm values configuration

# Global configuration
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# Application configuration
replicaCount: 3

image:
  registry: ghcr.io
  repository: nwagbara-group-llc/message-broker-engine
  tag: "1.0.0"
  pullPolicy: IfNotPresent
  pullSecrets: []

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}
  # AWS Load Balancer Controller annotations for ultra-low latency
  # service.beta.kubernetes.io/aws-load-balancer-type: nlb
  # service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: message-broker.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: message-broker-tls
    #   hosts:
    #     - message-broker.local

# Resource limits and requests - optimized for ultra-performance
resources:
  limits:
    cpu: "8"
    memory: 16Gi
  requests:
    cpu: "4"
    memory: 8Gi

# Ultra-performance optimizations
performance:
  # CPU affinity for dedicated cores
  cpuAffinity: true
  # NUMA node awareness
  numaAware: true
  # Huge pages for reduced TLB misses
  hugePagesEnabled: true
  hugePagesSize: "1Gi"

# Message broker specific configuration
broker:
  # Connection settings
  maxConnections: 10000
  maxTopics: 100000
  flushIntervalMs: 1
  
  # Performance tuning
  workerThreads: 32
  enableBatching: true
  batchSize: 100
  
  # Monitoring settings
  metricsEnabled: true
  metricsPort: 9090
  healthcheckPort: 8081

# Application configuration
config:
  logLevel: "info"
  messageQueueSize: 10000
  workerThreads: 4
  maxConnections: 1000
  enableMetrics: true

# Auto-scaling configuration
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  # Custom metrics for message throughput
  customMetrics:
    - type: Pods
      pods:
        metric:
          name: messages_per_second
        target:
          type: AverageValue
          averageValue: "50000"

# Pod Disruption Budget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Network policies for security
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: trading-system
      ports:
        - protocol: TCP
          port: 8080

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

podSecurityContext: {}

# Node selection for performance-optimized nodes
nodeSelector:
  node.kubernetes.io/instance-type: "c5n.metal"  # AWS bare metal for ultra-low latency
  
tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "trading"
    effect: "NoSchedule"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - ultra-message-broker
          topologyKey: kubernetes.io/hostname

# Persistent storage for message durability
persistence:
  enabled: true
  storageClass: "fast-ssd"
  accessMode: ReadWriteOnce
  size: 100Gi
  mountPath: /data

# Monitoring and observability
monitoring:
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 5s
    scrapeTimeout: 5s

# Logging configuration
logging:
  level: info
  format: json
  output: stdout

# Environment variables
env:
  - name: RUST_LOG
    value: "info"
  - name: RUST_BACKTRACE
    value: "1"
  - name: TOKIO_WORKER_THREADS
    value: "32"

# ConfigMap and Secret configurations
configMap:
  create: true
  data:
    broker.toml: |
      [server]
      host = "0.0.0.0"
      port = 8080
      max_connections = 10000
      
      [performance]
      worker_threads = 32
      flush_interval_ms = 1
      batch_size = 100
      
      [monitoring]
      metrics_enabled = true
      metrics_port = 9090

# Probes for health checking
livenessProbe:
  httpGet:
    path: /health
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8081
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /startup
    port: 8081
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "services", "endpoints"]
      verbs: ["get", "list", "watch"]