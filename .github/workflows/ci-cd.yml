# MessageBrokerEngine CI/CD Pipeline
# Deploys to self-hosted Kubernetes cluster using GHCR for container images

name: MessageBrokerEngine CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        type: boolean
        default: false

concurrency:
  group: messagebroker-engine-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/nwagbara-group-llc/messagebroker-engine
  NAMESPACE: messagebroker
  HELM_CHART_PATH: k8s/message-broker-engine

jobs:
  validate:
    name: Validate & Test
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 60
    outputs:
      tests-passed: ${{ steps.test-result.outputs.passed || steps.skip-test-result.outputs.passed }}
      skip-tests: ${{ steps.check-skip.outputs.skip }}
    steps:
      - name: Checkout MessageBrokerEngine
        uses: actions/checkout@v4
        with:
          path: MessageBrokerEngine

      - name: Checkout LoggingEngine
        uses: actions/checkout@v4
        with:
          repository: Nwagbara-Group-LLC/LoggingEngine
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: LoggingEngine

      - name: Verify Rust
        shell: powershell
        run: |
          Write-Host "Checking Rust installation..."
          rustc --version
          cargo --version

      - name: Check for Skip Tests Flag
        id: check-skip
        shell: powershell
        run: |
          cd MessageBrokerEngine
          $commitMsg = git log -1 --pretty=%B
          if ($commitMsg -match '\[skip-tests\]') {
            Write-Host "[SKIP] [skip-tests] flag detected in commit message"
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Running full validation with tests"
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Fast Check
        shell: powershell
        run: |
          Write-Host "Running fast cargo check..."
          cd MessageBrokerEngine
          cargo check --workspace --jobs 10
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[FAIL] Cargo check failed"
            exit 1
          }
          Write-Host "[OK] Fast check passed!"

      - name: Build Workspace
        shell: powershell
        run: |
          Write-Host "Building MessageBrokerEngine workspace..."
          cd MessageBrokerEngine
          cargo build --workspace --jobs 10
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[FAIL] Build failed!"
            exit 1
          }
          Write-Host "[OK] Build passed!"

      - name: Run Tests
        if: steps.check-skip.outputs.skip != 'true'
        id: test-result
        shell: powershell
        run: |
          Write-Host "Running tests..."
          cd MessageBrokerEngine
          cargo test --workspace --jobs 10
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[OK] Tests passed!"
            echo "passed=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "[FAIL] Tests failed!"
            echo "passed=false" >> $env:GITHUB_OUTPUT
            exit 1
          }

      - name: Skip Tests
        if: steps.check-skip.outputs.skip == 'true'
        id: skip-test-result
        shell: powershell
        run: |
          Write-Host "[SKIP] Tests skipped"
          echo "passed=true" >> $env:GITHUB_OUTPUT

  build:
    name: Build & Push
    runs-on: [self-hosted, windows, x64]
    needs: validate
    if: needs.validate.outputs.tests-passed == 'true' || github.event.inputs.skip_tests == 'true'
    timeout-minutes: 45
    steps:
      - name: Checkout MessageBrokerEngine
        uses: actions/checkout@v4
        with:
          path: MessageBrokerEngine
          fetch-depth: 0

      - name: Checkout LoggingEngine
        uses: actions/checkout@v4
        with:
          repository: Nwagbara-Group-LLC/LoggingEngine
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: LoggingEngine
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Image
        shell: powershell
        run: |
          Write-Host "Building Docker image..."
          $startTime = Get-Date
          
          $requiredDeps = @("LoggingEngine")
          foreach ($dep in $requiredDeps) {
            if (Test-Path $dep) {
              Write-Host "[OK] Dependency found: $dep"
            } else {
              Write-Host "[ERROR] Missing: $dep"
              exit 1
            }
          }
          
          # Get dependency commit SHAs for cache busting
          $loggingSha = (git -C LoggingEngine rev-parse --short HEAD)
          Write-Host "[INFO] Dependency versions: LoggingEngine=$loggingSha"
          
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          Write-Host "[INFO] Building with immutable tag: $shortSha"
          
          # Build without --platform flag (Docker Desktop handles Linux container builds)
          docker build --tag ${{ env.IMAGE_NAME }}:$shortSha --file MessageBrokerEngine/Dockerfile --build-arg LOGGING_ENGINE_SHA=$loggingSha --progress=plain .
          
          if ($LASTEXITCODE -ne 0) {
            throw "Docker build failed"
          }
          
          $buildDuration = (Get-Date) - $startTime
          Write-Host "[OK] Build completed in $([math]::Round($buildDuration.TotalMinutes, 1)) minutes"
          
          Write-Host "[PUSH] Pushing image..."
          docker push ${{ env.IMAGE_NAME }}:$shortSha
          Write-Host "[OK] Pushed image with immutable tag: $shortSha"

      - name: Security Scan
        shell: powershell
        continue-on-error: true
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          Write-Host "[SCAN] Running security scan with Trivy..."
          if (-not (Test-Path "trivy.exe")) {
            Write-Host "Installing Trivy..."
            Invoke-WebRequest -Uri "https://github.com/aquasecurity/trivy/releases/download/v0.48.3/trivy_0.48.3_windows-64bit.zip" -OutFile "trivy.zip"
            Expand-Archive trivy.zip -Force
            Move-Item trivy/trivy.exe . -Force
            Remove-Item trivy.zip, trivy -Recurse -Force
          }
          .\trivy.exe image --severity HIGH,CRITICAL --exit-code 0 --format table ${{ env.IMAGE_NAME }}:$shortSha
          Write-Host "[OK] Security scan complete"

      - name: Build Summary
        shell: powershell
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "Build Summary"
          Write-Host "=========================================="
          Write-Host "Image: ${{ env.IMAGE_NAME }}"
          Write-Host "Tag: $shortSha"
          Write-Host "Pull: docker pull ${{ env.IMAGE_NAME }}:$shortSha"
          Write-Host "=========================================="

  deploy:
    name: Deploy to Kubernetes
    runs-on: [self-hosted, windows, x64]
    needs: build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - name: Checkout MessageBrokerEngine
        uses: actions/checkout@v4
        with:
          path: MessageBrokerEngine

      - name: Check Kubernetes Connection
        shell: powershell
        run: |
          Write-Host "Verifying Kubernetes connection..."
          kubectl cluster-info
          kubectl get nodes
          Write-Host "[OK] Kubernetes connection verified"

      - name: Fetch Secrets from Azure Key Vault
        shell: powershell
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_KEYVAULT_NAME: ${{ secrets.AZURE_KEYVAULT_NAME }}
        run: |
          Write-Host "Fetching secrets from Azure Key Vault..."
          
          try {
            if ([string]::IsNullOrWhiteSpace($env:AZURE_CREDENTIALS)) {
              throw "AZURE_CREDENTIALS secret is empty or not set"
            }
            
            $creds = $env:AZURE_CREDENTIALS | ConvertFrom-Json -ErrorAction Stop
            
            if (-not $creds.clientId -or -not $creds.clientSecret -or -not $creds.tenantId) {
              throw "Invalid Azure credentials format"
            }
            
            Write-Host "[OK] Azure credentials parsed successfully"
          } catch {
            Write-Error "Failed to parse Azure credentials: $($_.Exception.Message)"
            exit 1
          }
          
          try {
            Write-Host "[INFO] Authenticating with Azure..."
            az login --service-principal --username $creds.clientId --password $creds.clientSecret --tenant $creds.tenantId --output json 2>&1 | Out-Null
            
            if ($LASTEXITCODE -ne 0) {
              throw "Azure CLI login failed"
            }
            
            Write-Host "[OK] Successfully authenticated with Azure"
          } catch {
            Write-Error "Azure authentication failed: $_"
            exit 1
          }
          
          $secretNames = @(
            "POSTGRES-HOST","POSTGRES-PORT","POSTGRES-USER","POSTGRES-PASSWORD","POSTGRES-DB",
            "ELASTIC-CLOUD-ENDPOINT","ELASTIC-CLOUD-USERNAME","ELASTIC-CLOUD-PASSWORD"
          )
          
          Write-Host "[INFO] Fetching $($secretNames.Count) secrets..."
          
          foreach ($secretName in $secretNames) {
            try {
              $envName = $secretName -replace "-", "_"
              $value = az keyvault secret show --vault-name $env:AZURE_KEYVAULT_NAME --name $secretName --query value -o tsv 2>&1
              
              if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($value)) {
                Write-Error "[FAIL] Failed to fetch secret $secretName"
                exit 1
              }
              
              $cleanValue = $value.Trim()
              echo "${envName}=${cleanValue}" >> $env:GITHUB_ENV
              Write-Host "[OK] Fetched $secretName"
            } catch {
              Write-Error "[FAIL] Error fetching $secretName : $_"
              exit 1
            }
          }
          
          Write-Host "[OK] All secrets fetched successfully"

      - name: Deploy to Kubernetes
        shell: powershell
        run: |
          Write-Host "Deploying MessageBrokerEngine to Kubernetes..."
          
          cd MessageBrokerEngine
          
          # Create namespace if it doesn't exist
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          
          # Create image pull secret for GHCR
          Write-Host "[INFO] Creating image pull secret..."
          kubectl create secret docker-registry ghcr-secret --docker-server=ghcr.io --docker-username=${{ github.actor }} --docker-password=${{ secrets.GITHUB_TOKEN }} --namespace=${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          
          # Build DATABASE_URL
          $databaseUrl = "postgresql://$($env:POSTGRES_USER):$($env:POSTGRES_PASSWORD)@$($env:POSTGRES_HOST):$($env:POSTGRES_PORT)/$($env:POSTGRES_DB)"
          
          # Create Kubernetes secrets
          Write-Host "[INFO] Creating application secrets in Kubernetes..."
          kubectl create secret generic messagebroker-secrets --from-literal=database-username="$($env:POSTGRES_USER)" --from-literal=database-password="$($env:POSTGRES_PASSWORD)" --from-literal=database-host="$($env:POSTGRES_HOST)" --from-literal=database-port="$($env:POSTGRES_PORT)" --from-literal=database-name="$($env:POSTGRES_DB)" --from-literal=DATABASE_URL="$databaseUrl" --from-literal=elasticsearch-endpoint="$($env:ELASTIC_CLOUD_ENDPOINT)" --from-literal=elasticsearch-username="$($env:ELASTIC_CLOUD_USERNAME)" --from-literal=elasticsearch-password="$($env:ELASTIC_CLOUD_PASSWORD)" --namespace=${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          
          Write-Host "[OK] Secrets synced to Kubernetes"
          
          $imageTag = "${{ github.sha }}".Substring(0, 7)
          Write-Host "[INFO] Deploying with image tag: $imageTag"
          
          $helmArgs = @(
            "--namespace", "${{ env.NAMESPACE }}",
            "--create-namespace",
            "--set", "image.repository=${{ env.IMAGE_NAME }}",
            "--set", "image.tag=$imageTag",
            "--set", "image.pullPolicy=IfNotPresent",
            "--set", "imagePullSecrets[0].name=ghcr-secret",
            "--set", "secrets.existingSecret=messagebroker-secrets",
            "--set", "config.database.host=$($env:POSTGRES_HOST)",
            "--set", "config.database.port=$($env:POSTGRES_PORT)",
            "--set", "config.database.database=$($env:POSTGRES_DB)",
            "--set", "replicaCount=1",
            "--wait",
            "--timeout", "10m"
          )
          
          # Check for stuck releases
          Write-Host "[INFO] Checking Helm release status..."
          $ErrorActionPreference = 'SilentlyContinue'
          $helmList = helm list -n ${{ env.NAMESPACE }} --all -o json | ConvertFrom-Json
          $ErrorActionPreference = 'Stop'
          
          if ($helmList -and $helmList.status -match "pending") {
            Write-Host "[WARN] Found stuck release in status: $($helmList.status)"
            if ($helmList.status -eq "pending-install") {
              helm uninstall messagebroker-engine -n ${{ env.NAMESPACE }} --wait --timeout 2m
            } else {
              helm rollback messagebroker-engine -n ${{ env.NAMESPACE }} --wait --timeout 2m
            }
            Start-Sleep -Seconds 5
          }
          
          Write-Host "Deploying with Helm..."
          helm upgrade --install messagebroker-engine ./${{ env.HELM_CHART_PATH }} @helmArgs --atomic --cleanup-on-fail
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[FAIL] Deployment failed!"
            exit 1
          }
          
          Write-Host "[OK] Deployment successful!"

      - name: Verify Deployment
        shell: powershell
        run: |
          Write-Host "Verifying deployment..."
          
          Write-Host ""
          Write-Host "Pods:"
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          
          Write-Host ""
          Write-Host "Services:"
          kubectl get services -n ${{ env.NAMESPACE }}
          
          Write-Host ""
          Write-Host "Deployments:"
          kubectl get deployments -n ${{ env.NAMESPACE }}
          
          Write-Host ""
          Write-Host "[OK] Deployment verification complete!"

      - name: Deployment Summary
        shell: powershell
        run: |
          $imageTag = "${{ github.sha }}".Substring(0, 7)
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "Deployment Summary"
          Write-Host "=========================================="
          Write-Host "Namespace: ${{ env.NAMESPACE }}"
          Write-Host "Release: messagebroker-engine"
          Write-Host "Image: ${{ env.IMAGE_NAME }}:$imageTag"
          Write-Host ""
          Write-Host "Secrets: Kubernetes secret 'messagebroker-secrets'"
          Write-Host ""
          Write-Host "Rollback:"
          Write-Host "  helm rollback messagebroker-engine -n ${{ env.NAMESPACE }}"
          Write-Host "=========================================="
