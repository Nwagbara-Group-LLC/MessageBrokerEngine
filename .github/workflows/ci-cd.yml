name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - staging
        - prod

env:
  REGISTRY: tradingplatformacr.azurecr.io
  IMAGE_NAME: message-broker-engine
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta]
        features: ["", "--all-features"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
        
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "v1-rust"
        shared-key: "message-broker-engine"
        
    - name: Install protobuf compiler
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
        
    - name: Check formatting
      run: cargo fmt -- --check
      
    - name: Run Clippy
      run: cargo clippy --all-targets ${{ matrix.features }} -- -D warnings
      
    - name: Build project
      run: cargo build --verbose ${{ matrix.features }}
      
    - name: Run tests
      run: cargo test --verbose ${{ matrix.features }}
      env:
        RUST_LOG: debug
        
    - name: Run integration tests
      run: cargo test --test '*' --verbose ${{ matrix.features }}
      
    - name: Generate test coverage
      if: matrix.rust == 'stable' && matrix.features == '--all-features'
      run: |
        cargo install cargo-tarpaulin
        cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml
        
    - name: Upload coverage to Codecov
      if: matrix.rust == 'stable' && matrix.features == '--all-features'
      uses: codecov/codecov-action@v3
      with:
        file: ./cobertura.xml
        flags: unittests
        name: message-broker-engine-coverage

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Rust dependencies  
      uses: Swatinem/rust-cache@v2
      
    - name: Run security audit
      run: |
        cargo install cargo-audit
        cargo audit
        
    - name: Run vulnerability scan
      run: |
        cargo install cargo-deny
        cargo deny check

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name != 'pull_request'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          RUST_VERSION=1.75
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'dev'
    environment:
      name: development
      url: https://message-broker-engine-dev.tradingplatform.local
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS_DEV }}
        
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
        
    - name: Get AKS credentials
      run: |
        az aks get-credentials --resource-group ${{ secrets.AZURE_RG_DEV }} --name ${{ secrets.AKS_CLUSTER_DEV }}
        
    - name: Deploy with Helm
      run: |
        helm upgrade --install message-broker-engine-dev ./helm/message-broker-engine \
          --namespace trading-platform-dev \
          --create-namespace \
          --values ./helm/message-broker-engine/values-dev.yaml \
          --set image.tag=${{ github.sha }} \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --wait --timeout=10m
          
    - name: Verify deployment
      run: |
        kubectl rollout status deployment/message-broker-engine-dev -n trading-platform-dev --timeout=300s
        kubectl get pods -n trading-platform-dev -l app.kubernetes.io/name=message-broker-engine

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/release/') || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://message-broker-engine-staging.tradingplatform.local
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}
        
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
        
    - name: Get AKS credentials
      run: |
        az aks get-credentials --resource-group ${{ secrets.AZURE_RG_STAGING }} --name ${{ secrets.AKS_CLUSTER_STAGING }}
        
    - name: Deploy with Helm
      run: |
        helm upgrade --install message-broker-engine-staging ./helm/message-broker-engine \
          --namespace trading-platform-staging \
          --create-namespace \
          --values ./helm/message-broker-engine/values-staging.yaml \
          --set image.tag=${{ github.sha }} \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --wait --timeout=15m
          
    - name: Run smoke tests
      run: |
        kubectl run smoke-test --rm -i --restart=Never \
          --image=curlimages/curl:latest \
          --namespace=trading-platform-staging \
          -- curl -f http://message-broker-engine-staging:8080/health

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://message-broker-engine.tradingplatform.com
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}
        
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
        
    - name: Get AKS credentials
      run: |
        az aks get-credentials --resource-group ${{ secrets.AZURE_RG_PROD }} --name ${{ secrets.AKS_CLUSTER_PROD }}
        
    - name: Deploy with Helm
      run: |
        helm upgrade --install message-broker-engine ./helm/message-broker-engine \
          --namespace trading-platform \
          --create-namespace \
          --values ./helm/message-broker-engine/values-prod.yaml \
          --set image.tag=${{ github.sha }} \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --wait --timeout=20m
          
    - name: Verify production deployment
      run: |
        kubectl rollout status deployment/message-broker-engine -n trading-platform --timeout=600s
        kubectl get pods -n trading-platform -l app.kubernetes.io/name=message-broker-engine
        
    - name: Run production health check
      run: |
        kubectl run health-check --rm -i --restart=Never \
          --image=curlimages/curl:latest \
          --namespace=trading-platform \
          -- curl -f http://message-broker-engine:8080/health

  notification:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: always()
    
    steps:
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        text: |
          MessageBrokerEngine deployment completed
          Environment: ${{ github.event.inputs.environment || 'auto' }}
          Status: ${{ job.status }}
          Commit: ${{ github.sha }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
